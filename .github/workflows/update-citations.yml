name: Update Citations

on:
  schedule:
    # Run on the 1st of every month at 04:00 UTC
    - cron: '0 4 1 * *'
  workflow_dispatch:
    inputs:
      no_cache:
        description: 'Ignore cached corpus (force fresh OpenAlex fetch)'
        type: boolean
        default: true

# Required for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time; don't cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout openff-stats (source of truth for input CSVs)
        uses: actions/checkout@v4
        with:
          repository: lilyminium/openff-stats
          path: openff-stats

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run citation pipeline
        run: |
          python pipeline.py \
            --publications openff-stats/inputs/publications.csv \
            --zenodo       openff-stats/inputs/zenodo.csv \
            --email        "${{ secrets.OPENALEX_EMAIL }}" \
            --no-cache
        env:
          PYTHONUNBUFFERED: "1"

      - name: Prepare Pages artifact
        # GitHub Pages expects a single directory; rename/copy the HTML as index
        run: |
          mkdir -p _site
          cp outputs/citations.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
